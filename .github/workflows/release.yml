name: release

on:
  push:
    tags:
      - "20*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate CalVer tag
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          if [[ ! "$TAG" =~ ^20[0-9]{2}\.[0-9]+\.[0-9]+$ ]]; then
            echo "unsupported release tag: $TAG (expected YYYY.M.P)" >&2
            exit 1
          fi
      - uses: cli/gh-extension-precompile@v2
        with:
          go_version_file: go.mod
